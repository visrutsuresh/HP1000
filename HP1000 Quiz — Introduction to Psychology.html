{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Which of the following statements is a formal definition of psychology?',opts:['Psychology is the scientific study of human nature.','Psychology is the scientific study of theories and research methods.','Psychology is the scientific study of the process of learning and modifying behavioral reflexes.','Psychology is the scientific study of behavior and mental processes.','Psychology is the scientific study of groups of people.'],ans:3},

{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The term "psyche" means',opts:['people.','thoughts.','processes.','brain.','mind.'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Modern psychology is best considered to be a',opts:['collection of pieces of folk wisdom.','series of contradictions to be sorted out.','science.','therapeutic process.','pseudoscience.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'In the definition of psychology, the term mental processes refers to',opts:['internal, covert activities.','outward behavior.','overt actions and reactions.','only animal behavior.','sensory and perceptual events.'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Which topic would NOT be investigated by a psychologist if the definition of psychology were limited to “the science of behavior”?',opts:['relation between grade-point average and salary','thought processes students used while trying to answer this question','how changes in the rate of television violence influence real-life violence','effectiveness of several treatments for people who suffer from depression','the hereditary determinants of sexual orientation'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The majority of psychologists work in',opts:['private practice.','public school.','government.','universities, colleges, and medical schools.','not-for-profit agencies.'],ans:3},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'These psychologists perform most of the research that creates new psychological knowledge:',opts:['industrial/organizational psychologists','clinical psychologists','school psychologists','applied psychologists','experimental psychologists'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Margaret is a psychologist who designs programs to increase employee morale and workplace productivity. She is a(n)',opts:['developmental psychologist.','clinical psychologist.','industrial/organizational psychologist.','applied psychologist.','experimental psychologist.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Dr. Jones is an industrial/organizational (I/O) psychologist. Thus, she is most likely to do which of the following?',opts:['help individuals who have eating disorders, such as anorexia nervosa','conduct experiments to determine which studying strategies work best','diagnose learning disabilities within a school district','assist an athlete in creating an effective schedule of practice sessions','Help companies develop questions to ask job candidates.'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'A(n) ________ psychologist would be most likely to help individuals overcome their depression.',opts:['clinical','industrial/organizational (I/O)','engineering','school','social'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'One major difference between psychiatry and psychology is that psychiatry is',opts:['a branch of sociology.','a medical specialty.','focused on importance of perception for human function.','part of a large group of specialties.','involved in case study research.'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Which degree is a psychologist LEAST likely to have earned?',opts:['master\\\'s','PhD','EdD','PsyD','MD'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Dr. Braunz has been treating a child with attention-deficit hyperactivity disorder. She decides to write a prescription for Ritalin. Given this information, it is most likely that Dr. Braunz is a',opts:['psychiatrist.','psychoanalyst.','humanistic psychologist.','school psychologist.','psychiatric social worker.'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Ross is a psychologist, whereas Rachel is a psychiatrist. Thus, which of the following is MOST likely to be true?',opts:['Rachel has not earned a PhD degree.','They both have earned MD degrees.','They both can prescribe medicine to help people with psychological problems.','Only Ross can treat people with psychological problems.','Ross is more likely than Rachel to use a medical perspective to understand people.'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Psychology is distinct from psychiatry in that it',opts:['requires significantly less graduate training.','is concerned with all behavior, not just abnormality and mental illness.','is based on counseling therapy rather than medication.','is less concerned with scientific method than the latter disciplines.','is not considered to be a scientific field.'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Psychology is differentiated from pseudo-psychology because of',opts:['the absolute certainty of its findings.','its focus on the natural rather than the social world.','the more widespread public acceptance of pseudoscience.','its findings are more relevant to human problems.','its method of using the scientific method to test theories and hypotheses.'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Which of the following is an example of pseudo-psychology?',opts:['paranormal claims','astrology','graphology','subliminal messages','All o f the above are correct.'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'One evening, when he couldn\\\'t sleep, Mr. Bradley turned on the television and saw an infomercial for a new sleep aid. As a critical thinker, Mr. Bradley should be most cautious about this new product if',opts:['the product had been subjected to an experimental study and the scrutiny of a peer-review process.','its makers claim it has been "proven" to induce sleep in 80 percent of test participants.','its makers discuss the scientific investigations that have compared it to other effective sleep aids rather than relying on testimonials of those with insomnia.','the results of research connect the efficacy of the sleep-aid to other widely accepted scientific findings.','the advertisement noted several scientifically controlled studies that all found the same results.'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'After the abduction and murder of a well-known business leader, lawmakers immediately passed new legislation for increased penalties. This is an example of',opts:['confirmation bias.','realistic bias.','volitional bias.','reactive bias.','emotional b ias.'],ans:3},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The tendency to look for information that supports one’s own belief is called',opts:['the principle of falsifiability.','confirmation bias.','criterion validity.','volunteer bias.','expectation bias.'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The tendency to look for supportive evidence rather than actively seeking out contradictory evidence is known as',opts:['the availability heuristic.','belief perseverance.','the confirmation bias.','the hindsight bias.','the emotional bias.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Gwen has posted a questionnaire on MySpace asking her friends to support her idea of cell phones in the classroom. She ignores anyone opposing her beliefs, which is an example of',opts:['naïve realism.','conjunctive fallacy.','confirmation bias.','attribution bias.','reactive bias.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Noted Greek philosophers such as Socrates, Plato, and Aristotle observed that',opts:['brain damage contributed to most mental disorders.','emotions were caused by changes in brain chemistry.','"truth" was determined by careful testing procedures.','emotions can distort thinking.','emotions were not worthy of scientific discussion.'],ans:3},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'French philosopher René Descartes most likely would believe that individuals suffer from schizophrenia due to',opts:['irrational ways of interpreting events in the world.','unconscious conflicts involving sexuality and aggression.','whether an individual lives in a destructive society','the upbringing of the person.','activity within the person\\\'s nervous system.'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'A psychologist who studies how hormones affect a person\\\'s behavior is using the ________ perspective.',opts:['biological','functional','deterministic','evolutionary','humanistic'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Evolutionary psychology might suggest that certain cognitive strategies and goals are built into the brain because',opts:['they help humans adapt to their natural environment.','human brains are similar to the brains of the higher primates.','they are the result of learning that has taken place over many centuries.','they are the result of memories we have inherited from our ancestors.','they are prewired to help us achieve self-actualization during our lifetimes.'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Dr. Jones probably agrees with the ________ theory of psychology, since he contends that humans are intelligent species due to the fact that intelligence gives us an advantage in the natural world.',opts:['psychoanalytic','behavioral','cognitive','evolutionary','developmental'],ans:3},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'A breakthrough in the scientific field of ________ ultimately led to the world\\\'s first psychology laboratory.',opts:['chemistry','botany','biology','sociology','geology'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Chemistry, physics, and anthropology are classified as scientific because of their',opts:['findings.','philosophy.','methods.','clinical application.','usefulness in general life.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'In 1879, in Leipzig, Germany, the first psychological laboratory was overseen by',opts:['William James.','William Tell.','Wilhelm Wundt.','Sigmund Freud.','William the Conqueror.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Wilhelm Wundt founded the',opts:['notion of free will.','approach of radical behaviorism.','psychodynamic approach.','first psychology laboratory.','first therapy clinic.'],ans:3},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'At the close of the nineteenth century, Gerhard is excited to find that he has been accepted for training in the psychology laboratory of Wilhelm Wundt. It is likely that Gerhard will be trained to',opts:['analyze how to break down his sensations into their most basic elements.','determine the function or purpose of a particular human behavior.','listen intently while individuals tell him of their depression or nervousness.','carefully feel the bumps on a person’s head in order to determine his or her character traits.','uncover a person’s unconscious conflicts.'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The school of psychology called s tructuralism used a technique called _____, which involved reporting the contents of consciousness to study a person’s experiences.',opts:['intervention','introspection','insight inventory','induction','investigation'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The research technique of introspection',opts:['measures people biologically by using tools such as an MRI or PET scan.','studies groups of people interacting with one another.','asks people to describe their sensations and responses.','studies children rather than adolescents and adults.','exposes people to a variety of stressful situations to determine how they will respond.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'What is the best analogy for Wundt’s and Titchener’s mission for psychology?',opts:['a chart listing the basic chemical elements','a list of the courses required for graduation','an umbrella keeping you dry in a storm.','a computer program for word processing a term paper','a traffic light that alternates colors on a predictable time schedule'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Structuralists were concerned with uncovering the basic components of',opts:['the unconscious.','the mind.','the environment.','culture.','the family unit.'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Who was an early proponent of functionalism?',opts:['Ivan Pavlov','William James','Wilhelm Wundt','Max Wertheimer','E.B. Titchener'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Functionalists were interested in the function of ________ in dealing with the problems of everyday living.',opts:['family and friends','consciousness','stress reduction techniques','drugs','professional therapists'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'If a functionalist from the 1870s were alive today, where would we most likely find him?',opts:['in a laboratory, studying principles of perception','in a school, working to i mprove teaching methods','in a mountain retreat, contemplating the meaning of life','in a sleep laboratory, trying to determine if our need for sleep is biologically based','in a hospital doing research into the neurochemicals that have survived various “levels” of human evolution'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Gestalt psychology argued that perception is',opts:['altered by an evolutionary pressure to avoid being eaten.','impossible to study using introspection.','a process in which the whole is more than the sum of the parts.','a process found in animals but not humans.','a function of our unique streams of consciousness.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'While on a visit to a large city, you observe several billboards in which a series of lights seems to move. Which perspective in psychology would most likely help you understand this phenomenon?',opts:['Gestalt','behavioral','humanistic','psychodynamic','temperament'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The first applied psychologists were the',opts:['structuralists.','behaviorists.','functionalists.','Gestalt psychologists.','psychoanalysts.'],ans:2},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'A scientist who studies the strategies involved in playing a game of chess is most likely to follow a(n) ________ approach to psychology.',opts:['cognitive','humanistic','behavioristic','evolutionary','psychoanalytic'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'A cognitive psychologist has been studying aggression in teens. Which of the following is most likely to be the title of his latest study?',opts:['"The Consequences of Teen Violence"','"The Family Dynamics of Violent Teens"','"Social Pressures that Produce Violent Teens"','"The Use of Medications to Control Aggression in Teens"','"The Reasons Why Teens Say They Act Violently"'],ans:4},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'The key feature of behaviorism that distinguishes it from other approaches to psychology is that',opts:['consciousness is central to the study of the mind.','only observable behavior is appropriate for study.','mental abilities evolve just as physical characteristics do.','a holistic view of a person is essential for understanding.','groups, not individuals, should be the focus of study.'],ans:1},

{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'John B. Watson believed that psychology should involve the study of',opts:['behavior.','the mind.','the brain.','consciousness.','emotions.'],ans:0},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Which school of psychology questioned whether psychologists should study the mind?',opts:['psychodynamic theory','behaviorism','Gestalt psychology','cognitive psychology','humanistic psychology'],ans:1},
{ch:1,src:'qbank',label:'Ch.1 Intro & Methods',q:'Suppose you were a graduate student studying for a PhD in psychology in the 1920s. Your advisor was strongly influenced by John B. Watson. Which of the following might your advisor consider an acceptable choice for your research?',opts:['a survey of daydreams','an analysis of how specific behaviors are acquired','a survey of sexual imagery in dreams of men and women','an analysis of the thought processes students report while answering test items','the achievement of self-actualization and why it is such a rarely seen occurrence'],ans:1},

let currentChapter='all',sessionQueue=[],currentIndex=0,correct=0,incorrect=0,wrongIds=[],_answered=false;
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function setChapter(ch){
  currentChapter=ch;
  const vals=['all',1,2,3,4,5,12];
  document.querySelectorAll('#chapter-filter button').forEach((b,i)=>b.classList.toggle('active',vals[i]===ch));
  startQuiz();
}
function startQuiz(pool){
  let src=pool||(currentChapter==='all'?ALL_QUESTIONS:ALL_QUESTIONS.filter(q=>q.ch===currentChapter));
  sessionQueue=shuffle(src);currentIndex=0;correct=0;incorrect=0;wrongIds=[];_answered=false;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('question-card').style.display='block';
  renderQuestion();
}
function resetQuiz(){
  currentIndex=0;correct=0;incorrect=0;wrongIds=[];_answered=false;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('question-card').style.display='block';
  renderQuestion();
}
function confirmReset(){
  if(currentIndex===0&&correct===0&&incorrect===0){resetQuiz();return;}
  if(confirm('Reset to Question 1? Progress will be cleared.'))resetQuiz();
}
function retryWrong(){
  if(!wrongIds.length)return;
  const pool=wrongIds.map(i=>sessionQueue[i]);
  wrongIds=[];correct=0;incorrect=0;startQuiz(pool);
}
function renderQuestion(){
  if(currentIndex>=sessionQueue.length){showResult();return;}
  const q=sessionQueue[currentIndex];_answered=false;
  document.getElementById('progress-bar').style.width=((currentIndex/sessionQueue.length)*100)+'%';
  document.getElementById('q-counter').textContent=`Question ${currentIndex+1} of ${sessionQueue.length}`;
  document.getElementById('score-correct').textContent=`✓ ${correct}`;
  document.getElementById('score-wrong').textContent=`✗ ${incorrect}`;
  document.getElementById('q-chapter-tag').textContent=q.label;
  const se=document.getElementById('q-src-tag');
  se.textContent=q.src==='notes'?'📓 Notes':'📄 Q-Bank';se.className='q-src '+q.src;
  document.getElementById('q-num-tag').textContent=`#${currentIndex+1}`;
  document.getElementById('question-text').textContent=q.q;
  const fb=document.getElementById('feedback');fb.style.display='none';fb.textContent='';fb.className='';
  const opts=document.getElementById('options');opts.innerHTML='';
  ['A','B','C','D','E'].forEach((letter,i)=>{
    if(i>=q.opts.length)return;
    const btn=document.createElement('button');btn.className='option-btn';
    btn.innerHTML=`<span class="option-letter">${letter}</span><span>${q.opts[i]}</span>`;
    btn.onclick=()=>checkAnswer(i);opts.appendChild(btn);
  });
  document.getElementById('next-btn').style.display='none';
}
function checkAnswer(selected){
  if(_answered)return;_answered=true;
  const q=sessionQueue[currentIndex];
  const btns=document.querySelectorAll('.option-btn');btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(selected===q.ans){
    correct++;btns[selected].classList.add('correct');
    fb.textContent='✅ Correct!';fb.className='correct';
  }else{
    incorrect++;wrongIds.push(currentIndex);
    btns[selected].classList.add('wrong');btns[q.ans].classList.add('show-correct');
    fb.textContent=`❌ Incorrect. Correct answer: ${['A','B','C','D','E'][q.ans]}.`;fb.className='wrong';
  }
  fb.style.display='block';
  document.getElementById('next-btn').style.display='inline-flex';
  document.getElementById('score-correct').textContent=`✓ ${correct}`;
  document.getElementById('score-wrong').textContent=`✗ ${incorrect}`;
}
function nextQuestion(){currentIndex++;renderQuestion();}
function showResult(){
  document.getElementById('question-card').style.display='none';
  const rs=document.getElementById('result-screen');rs.style.display='block';
  const total=sessionQueue.length,pct=Math.round((correct/total)*100);
  document.getElementById('result-emoji').textContent=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'📚':'💪';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('score-detail').textContent=`${correct} / ${total}`;
  document.getElementById('result-sub').textContent=`${correct} correct, ${incorrect} incorrect out of ${total} questions.`;
  const rb=document.getElementById('retry-wrong-btn');
  rb.disabled=wrongIds.length===0;rb.textContent=`❌ Retry Wrong (${wrongIds.length})`;
  document.getElementById('progress-bar').style.width='100%';
}
startQuiz();

</script>
